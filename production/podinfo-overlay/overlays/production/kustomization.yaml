# base resources to overlay
resources:
  - ../../base


# Order of operations matter, so....
# 1. Patches for CRDs
# 2. Additions
# 3. Overlays/Changes

# patch resources
patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command
        value: ["./podinfo", "--port=9898", "--port-metrics=9797", "--grpc-port=9999", "--grpc-service-name=podinfo-overlay-production", "--level=info", "--random-deploy=false", "--random-error=false", ""]
    target:
      version: apps/v1
      kind: Deployment
      name: podinfo
  - patch: |-
      - op: replace
        path: /spec/template/metadata/labels/app
        value: podinfo-overlay-production
    target:
      version: apps/v1
      kind: Deployment
      name: podinfo  

# add metadata name
metadata:
  name: podinfo-overlay-production    

# add namespace
namespace: dicki-deployment

# add labels and selectors
labels:
  - pairs:
      environment: podinfo-overlay-production
    includeTemplates: true

# add replica count
replicas:
  - name: podinfo
    count: 3


# overlay/change image tag
images:
  - name: podinfo
    newName: ghcr.io/stefanprodan/podinfo
    newTag: 6.7.1

# generate configmap used in deployment
configMapGenerator:
  - name: podinfo-overlay-config
    literals:
      - PODINFO_UI_COLOR=#f2110a      
      - ENVIRONMENT=podinfo-overlay-production      
    options:
      disableNameSuffixHash: true
